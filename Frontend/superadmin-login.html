<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kavach Net — Super Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .page {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        padding: 20px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 100vh;
      }
      .header {
        text-align: center;
        margin-bottom: 32px;
      }
      .icon-wrap {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.25);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: #f87171;
      }
      .header h2 {
        font-size: 1.3rem;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 4px;
      }
      .header p {
        font-size: 0.8rem;
        color: #64748b;
      }
      .warning-bar {
        background: rgba(239, 68, 68, 0.07);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 0.75rem;
        color: #fca5a5;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
      }
      .btn-login.loading .btn-text {
        display: none;
      }
      .btn-login.loading .btn-spinner {
        display: inline-block;
      }
      .btn-spinner {
        display: none;
      }
      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 0.72rem;
        color: #374151;
      }
      .alert-bar {
        display: none;
        border-radius: 9px;
        font-size: 0.8rem;
        padding: 10px 14px;
        margin-bottom: 16px;
        align-items: center;
        gap: 8px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.25);
        color: #fca5a5;
      }
      .alert-bar.show {
        display: flex;
      }
    </style>
  </head>
  <body class="landing-body">
    <!-- PREMIUM BACKGROUND LAYERS -->
    <div class="cyber-mesh"></div>
    <div class="mesh-glow"></div>

    <div class="page">
      <div class="auth-card auth-card-superadmin">
        <div style="display: flex; gap: 16px; margin-bottom: 22px">
          <a
            href="landing.html"
            class="back-link"
            style="
              display: flex;
              align-items: center;
              gap: 6px;
              font-size: 0.78rem;
              color: #4b5563;
              text-decoration: none;
              transition: color 0.2s;
              width: fit-content;
            "
          >
            <i class="bi bi-house"></i> Home
          </a>
          <a
            href="portal.html"
            class="back-link"
            style="
              display: flex;
              align-items: center;
              gap: 6px;
              font-size: 0.78rem;
              color: #4b5563;
              text-decoration: none;
              transition: color 0.2s;
              width: fit-content;
            "
          >
            <i class="bi bi-arrow-left"></i> Back to role selection
          </a>
        </div>
        <div class="header">
          <div class="icon-wrap">
            <i class="bi bi-shield-fill-exclamation"></i>
          </div>
          <h2>Super Admin Access</h2>
          <p>Kavach Net Operations Team Only</p>
        </div>

        <div class="warning-bar">
          <i class="bi bi-exclamation-triangle-fill"></i>
          Restricted access. Unauthorised login attempts are logged.
        </div>

        <div class="alert-bar" id="alertBar">
          <i class="bi bi-x-circle-fill"></i>
          <span id="alertText"></span>
        </div>

        <div class="auth-form-group">
          <input
            type="text"
            id="usernameInput"
            placeholder="Super admin username"
            autocomplete="off"
            required
          />
          <label for="usernameInput">Username</label>
          <span class="auth-input-icon"><i class="bi bi-person-fill"></i></span>
        </div>
        <div class="auth-form-group">
          <input
            type="password"
            id="passwordInput"
            placeholder="Super admin password"
            required
          />
          <label for="passwordInput">Password</label>
          <span class="auth-input-icon"><i class="bi bi-lock-fill"></i></span>
        </div>

        <button
          class="auth-btn auth-btn-superadmin btn-login"
          id="loginBtn"
          onclick="doLogin()"
        >
          <span id="btnText" class="btn-text"
            ><i class="bi bi-shield-lock me-1"></i> Access Control Panel</span
          >
          <span class="btn-spinner"><span class="spinner"></span></span>
        </button>

        <div class="footer">Kavach Net © 2026 · Internal Operations</div>
      </div>
    </div>

    <script src="api.js"></script>
    <script>
      // Nuclear Fix: Force clear any old tokens on the login page to ensure
      // the browser doesn't try to use a "broken" identity token.
      clearToken();
      clearSession();
      console.log("[AUTH] Security session cleared for fresh start.");

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      async function doLogin() {
        const username = document.getElementById("usernameInput").value.trim();
        const password = document.getElementById("passwordInput").value;
        const btn = document.getElementById("loginBtn");
        const alertBar = document.getElementById("alertBar");
        alertBar.className = "alert-bar";

        if (!username || !password) {
          showAlert("Please enter both fields.");
          return;
        }

        btn.disabled = true;
        document.getElementById("btnText").innerHTML =
          '<span class="spinner"></span>';

        try {
          const res = await apiPost("/auth/superadmin/login", {
            username,
            password,
          });
          if (res.ok) {
            const d = res.data.data || res.data;
            saveToken(d.access_token);
            saveRefreshToken(d.refresh_token);
            saveSession({
              username,
              role: "superadmin",
              institution_code: null,
            });
            window.location.href = "superadmin.html";
          } else {
            showAlert(res.data.error || "Login failed.");
            btn.disabled = false;
            document.getElementById("btnText").innerHTML =
              '<i class="bi bi-shield-lock me-1"></i> Access Control Panel';
          }
        } catch (err) {
          console.error("[AUTH] Login error:", err);
          if (err.message.includes("timed out")) {
            showAlert(
              "Request Timed Out. The security server is currently waking up (takes ~60s). Please try again in a moment.",
            );
          } else {
            showAlert(
              "Cannot reach backend. The security systems might be temporarily unreachable.",
            );
          }
          btn.disabled = false;
          document.getElementById("btnText").innerHTML =
            '<i class="bi bi-shield-lock me-1"></i> Access Control Panel';
        }
      }

      function showAlert(msg) {
        const bar = document.getElementById("alertBar");
        bar.className = "alert-bar show error";
        document.getElementById("alertText").textContent = msg;
      }
    </script>
  </body>
</html>
