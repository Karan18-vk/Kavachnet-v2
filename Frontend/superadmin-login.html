<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kavach Net — Super Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #020608;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .bg-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.2;
        animation: drift 18s ease-in-out infinite alternate;
      }
      .blob-1 {
        width: 500px;
        height: 500px;
        background: #7f1d1d;
        top: -100px;
        left: -100px;
      }
      .blob-2 {
        width: 350px;
        height: 350px;
        background: #1e1b4b;
        bottom: -80px;
        right: -80px;
        animation-delay: -9s;
      }
      @keyframes drift {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(20px, 15px) scale(1.05);
        }
      }
      .bg-grid {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px
        );
        background-size: 36px 36px;
      }
      .page {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        padding: 20px;
      }
      .card {
        background: rgba(8, 10, 14, 0.92);
        border: 1px solid rgba(239, 68, 68, 0.15);
        border-radius: 20px;
        padding: 40px 36px;
        backdrop-filter: blur(24px);
        box-shadow:
          0 0 60px rgba(239, 68, 68, 0.05),
          0 28px 64px rgba(0, 0, 0, 0.7);
      }
      .header {
        text-align: center;
        margin-bottom: 32px;
      }
      .icon-wrap {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.25);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        color: #f87171;
      }
      .header h2 {
        font-size: 1.3rem;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 4px;
      }
      .header p {
        font-size: 0.8rem;
        color: #64748b;
      }
      .warning-bar {
        background: rgba(239, 68, 68, 0.07);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 0.75rem;
        color: #fca5a5;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
      }
      .form-group {
        position: relative;
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 0.72rem;
        font-weight: 600;
        color: #64748b;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .form-group input {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        color: #f1f5f9;
        font-size: 0.9rem;
        padding: 12px 42px 12px 14px;
        outline: none;
        font-family: "Inter", sans-serif;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .form-group input:focus {
        border-color: #ef4444;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
      }
      .icon-right {
        position: absolute;
        right: 13px;
        bottom: 13px;
        color: #4b5563;
        font-size: 1rem;
      }
      .alert-bar {
        display: none;
        border-radius: 9px;
        font-size: 0.8rem;
        padding: 10px 14px;
        margin-bottom: 16px;
        align-items: center;
        gap: 8px;
      }
      .alert-bar.show {
        display: flex;
      }
      .alert-bar.error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.25);
        color: #fca5a5;
      }
      .btn-login {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, #991b1b, #7c3aed);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 0.93rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        transition:
          box-shadow 0.2s,
          transform 0.15s;
      }
      .btn-login:hover {
        box-shadow: 0 6px 24px rgba(153, 27, 27, 0.4);
        transform: translateY(-1px);
      }
      .btn-login:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 0.72rem;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <div class="bg-canvas">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="bg-grid"></div>
    </div>

    <div class="page">
      <div class="card">
        <div class="header">
          <div class="icon-wrap">
            <i class="bi bi-shield-fill-exclamation"></i>
          </div>
          <h2>Super Admin Access</h2>
          <p>Kavach Net Operations Team Only</p>
        </div>

        <div class="warning-bar">
          <i class="bi bi-exclamation-triangle-fill"></i>
          Restricted access. Unauthorised login attempts are logged.
        </div>

        <div class="alert-bar" id="alertBar">
          <i class="bi bi-x-circle-fill"></i>
          <span id="alertText"></span>
        </div>

        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            id="usernameInput"
            placeholder="Super admin username"
            autocomplete="off"
          />
          <span class="icon-right"><i class="bi bi-person-fill"></i></span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="passwordInput"
            placeholder="Super admin password"
          />
          <span class="icon-right"><i class="bi bi-lock-fill"></i></span>
        </div>

        <button class="btn-login" id="loginBtn" onclick="doLogin()">
          <span id="btnText"
            ><i class="bi bi-shield-lock me-1"></i> Access Control Panel</span
          >
        </button>

        <div class="footer">Kavach Net © 2026 · Internal Operations</div>
      </div>
    </div>

    <script src="api.js"></script>
    <script>
      // Nuclear Fix: Force clear any old tokens on the login page to ensure
      // the browser doesn't try to use a "broken" identity token.
      clearToken();
      clearSession();
      console.log("[AUTH] Security session cleared for fresh start.");

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      async function doLogin() {
        const username = document.getElementById("usernameInput").value.trim();
        const password = document.getElementById("passwordInput").value;
        const btn = document.getElementById("loginBtn");
        const alertBar = document.getElementById("alertBar");
        alertBar.className = "alert-bar";

        if (!username || !password) {
          showAlert("Please enter both fields.");
          return;
        }

        btn.disabled = true;
        document.getElementById("btnText").innerHTML =
          '<span class="spinner"></span>';

        try {
          const res = await apiPost("/api/superadmin/login", {
            username,
            password,
          });
          if (res.ok) {
            saveToken(res.data.access_token);
            saveSession({
              username,
              role: "superadmin",
              institution_code: null,
            });
            window.location.href = "superadmin.html";
          } else {
            showAlert(res.data.error || "Login failed.");
            btn.disabled = false;
            document.getElementById("btnText").innerHTML =
              '<i class="bi bi-shield-lock me-1"></i> Access Control Panel';
          }
        } catch (err) {
          console.error("[AUTH] Login error:", err);
          if (err.message.includes("timed out")) {
            showAlert(
              "Request Timed Out. The security server is currently waking up (takes ~60s). Please try again in a moment.",
            );
          } else {
            showAlert(
              "Cannot reach backend. The security systems might be temporarily unreachable.",
            );
          }
          btn.disabled = false;
          document.getElementById("btnText").innerHTML =
            '<i class="bi bi-shield-lock me-1"></i> Access Control Panel';
        }
      }

      function showAlert(msg) {
        const bar = document.getElementById("alertBar");
        bar.className = "alert-bar show error";
        document.getElementById("alertText").textContent = msg;
      }
    </script>
  </body>
</html>
