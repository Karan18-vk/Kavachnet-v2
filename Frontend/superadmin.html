<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kavach Net — Operations Panel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #060c15;
        color: #e2e8f0;
        min-height: 100vh;
      }

      /* ── Topbar ── */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        height: 60px;
        background: rgba(6, 12, 21, 0.95);
        border-bottom: 1px solid rgba(239, 68, 68, 0.15);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        backdrop-filter: blur(12px);
      }
      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .topbar-brand .badge-sa {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
        font-size: 0.68rem;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 5px;
        letter-spacing: 0.5px;
      }
      .topbar-brand span {
        font-size: 1rem;
        font-weight: 700;
        color: #f1f5f9;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .topbar-user {
        font-size: 0.82rem;
        color: #64748b;
      }
      .btn-logout {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #f87171;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        transition: all 0.2s;
      }
      .btn-logout:hover {
        background: rgba(239, 68, 68, 0.2);
      }

      /* ── Main ── */
      .main {
        padding-top: 80px;
        padding-bottom: 40px;
        max-width: 1200px;
        margin: 0 auto;
        padding-left: 24px;
        padding-right: 24px;
      }

      /* ── Stats bar ── */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        padding: 18px 20px;
      }
      .stat-card .val {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1;
        margin-bottom: 4px;
      }
      .stat-card .lbl {
        font-size: 0.78rem;
        color: #64748b;
      }
      .c-yellow {
        color: #fbbf24;
      }
      .c-green {
        color: #22c55e;
      }
      .c-red {
        color: #f87171;
      }
      .c-blue {
        color: #60a5fa;
      }

      /* ── Section title ── */
      .section-title {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #475569;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
      }

      /* ── Filter tabs ── */
      .filter-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .filter-tab {
        padding: 6px 16px;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: #94a3b8;
        transition: all 0.2s;
        font-family: "Inter", sans-serif;
      }
      .filter-tab.active {
        background: rgba(99, 102, 241, 0.15);
        border-color: rgba(99, 102, 241, 0.35);
        color: #a5b4fc;
      }
      .filter-tab:hover:not(.active) {
        background: rgba(255, 255, 255, 0.06);
        color: #cbd5e1;
      }

      /* ── Institution cards ── */
      .inst-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 14px;
        padding: 20px 22px;
        margin-bottom: 14px;
        transition: border-color 0.2s;
      }
      .inst-card:hover {
        border-color: rgba(255, 255, 255, 0.12);
      }
      .inst-card.pending {
        border-left: 3px solid #fbbf24;
      }
      .inst-card.approved {
        border-left: 3px solid #22c55e;
      }
      .inst-card.rejected {
        border-left: 3px solid #f87171;
      }
      .inst-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .inst-name {
        font-size: 1rem;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 2px;
      }
      .inst-meta {
        font-size: 0.78rem;
        color: #64748b;
      }
      .inst-badges {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .badge-status {
        font-size: 0.7rem;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
      }
      .badge-status.pending {
        background: rgba(251, 191, 36, 0.12);
        color: #fbbf24;
        border: 1px solid rgba(251, 191, 36, 0.25);
      }
      .badge-status.approved {
        background: rgba(34, 197, 94, 0.12);
        color: #22c55e;
        border: 1px solid rgba(34, 197, 94, 0.25);
      }
      .badge-status.rejected {
        background: rgba(239, 68, 68, 0.12);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.25);
      }
      .inst-details {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 8px;
      }
      .inst-detail-item {
        font-size: 0.78rem;
      }
      .inst-detail-item .key {
        color: #475569;
        margin-bottom: 1px;
      }
      .inst-detail-item .value {
        color: #cbd5e1;
        font-weight: 500;
      }
      .inst-code-box {
        background: rgba(34, 197, 94, 0.07);
        border: 1px solid rgba(34, 197, 94, 0.2);
        border-radius: 8px;
        padding: 8px 14px;
        margin-top: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .inst-code-box .label {
        font-size: 0.72rem;
        color: #4ade80;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .inst-code-box .code {
        font-family: "Courier New", monospace;
        font-size: 1.1rem;
        font-weight: 800;
        color: #22c55e;
        letter-spacing: 2px;
      }
      .copy-btn {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.2);
        color: #4ade80;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 0.75rem;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        transition: all 0.2s;
      }
      .copy-btn:hover {
        background: rgba(34, 197, 94, 0.2);
      }
      .inst-actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
        flex-wrap: wrap;
      }
      .btn-approve {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.25);
        color: #4ade80;
        border-radius: 8px;
        padding: 7px 16px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        transition: all 0.2s;
      }
      .btn-approve:hover {
        background: rgba(34, 197, 94, 0.2);
      }
      .btn-reject {
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #f87171;
        border-radius: 8px;
        padding: 7px 16px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        transition: all 0.2s;
      }
      .btn-reject:hover {
        background: rgba(239, 68, 68, 0.15);
      }
      .members-pill {
        font-size: 0.72rem;
        color: #94a3b8;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        padding: 3px 9px;
      }
      .rejection-note {
        font-size: 0.75rem;
        color: #94a3b8;
        margin-top: 8px;
      }

      /* ── Reject modal ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.show {
        display: flex;
      }
      .modal-box {
        background: #0d1521;
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 16px;
        padding: 28px;
        width: 440px;
        max-width: 95vw;
      }
      .modal-box h3 {
        font-size: 1rem;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 8px;
      }
      .modal-box p {
        font-size: 0.82rem;
        color: #94a3b8;
        margin-bottom: 16px;
      }
      .modal-box textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #f1f5f9;
        font-family: "Inter", sans-serif;
        font-size: 0.85rem;
        padding: 12px;
        resize: vertical;
        min-height: 80px;
        outline: none;
      }
      .modal-box textarea:focus {
        border-color: #ef4444;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }
      .modal-cancel {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #94a3b8;
        cursor: pointer;
        font-family: "Inter", sans-serif;
      }
      .modal-confirm {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
        cursor: pointer;
        font-family: "Inter", sans-serif;
      }
      .modal-confirm:hover {
        background: rgba(239, 68, 68, 0.25);
      }

      .empty-state {
        text-align: center;
        padding: 48px 20px;
        color: #4b5563;
        font-size: 0.9rem;
      }
      .empty-state i {
        font-size: 2.5rem;
        margin-bottom: 12px;
        display: block;
      }
      .spinner-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        gap: 10px;
        color: #64748b;
      }
      .spinner-sm {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 300;
        background: rgba(16, 24, 36, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 12px 18px;
        font-size: 0.83rem;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        pointer-events: none;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-brand">
        <img
          src="Kavach Net logo.png"
          alt="Logo"
          style="width: 32px; height: 32px; border-radius: 8px"
        />
        <span>Kavach Net</span>
        <div class="badge-sa">SUPER ADMIN</div>
      </div>
      <div class="topbar-right">
        <a
          href="maker-portal.html"
          style="
            font-size: 0.82rem;
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            margin-right: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
          "
        >
          <i class="bi bi-cpu"></i> Maker Portal
        </a>
        <span class="topbar-user" id="saUsername">Operations Panel</span>
        <button class="btn-logout" onclick="logoutSuperAdmin()">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Stats -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="val c-blue" id="stat-total">—</div>
          <div class="lbl">Total Institutions</div>
        </div>
        <div class="stat-card">
          <div class="val c-yellow" id="stat-pending">—</div>
          <div class="lbl">Pending Review</div>
        </div>
        <div class="stat-card">
          <div class="val c-green" id="stat-approved">—</div>
          <div class="lbl">Approved</div>
        </div>
        <div class="stat-card">
          <div class="val c-red" id="stat-rejected">—</div>
          <div class="lbl">Rejected</div>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="section-title">Institution Requests</div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterBy('all', this)">
          All
        </button>
        <button class="filter-tab" onclick="filterBy('pending', this)">
          ⏳ Pending
        </button>
        <button class="filter-tab" onclick="filterBy('approved', this)">
          ✅ Approved
        </button>
        <button class="filter-tab" onclick="filterBy('rejected', this)">
          ❌ Rejected
        </button>
      </div>

      <!-- Cards container -->
      <div id="cardsContainer">
        <div class="spinner-wrap">
          <div class="spinner-sm"></div>
          Loading institutions…
        </div>
      </div>
    </div>

    <!-- Reject modal -->
    <div class="modal-overlay" id="rejectModal">
      <div class="modal-box">
        <h3>Reject Institution</h3>
        <p>
          Optionally provide a reason. The institution will not receive this
          directly — it's for your records only.
        </p>
        <textarea
          id="rejectReason"
          placeholder="Reason for rejection (optional)…"
        ></textarea>
        <div class="modal-actions">
          <button class="modal-cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-confirm" onclick="confirmReject()">
            Confirm Rejection
          </button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
      <i class="bi bi-check-circle-fill" style="color: #22c55e"></i>
      <span id="toastMsg"></span>
    </div>

    <script src="api.js"></script>
    <script>
      requireSuperAdmin();
      console.log("[SESSION] Dashboard accessed as:", getSession());

      let allInstitutions = [];
      let currentFilter = "all";
      let rejectTargetId = null;

      const session = getSession();
      if (session)
        document.getElementById("saUsername").textContent = session.username;

      // ── Load all institutions ─────────────────────────────
      async function loadInstitutions() {
        try {
          const res = await apiGet("/api/superadmin/institutions");
          if (!res.ok) {
            const errorMsg =
              res.data.error || `Error ${res.status}: Failed to load.`;
            showToast("❌ " + errorMsg);
            throw new Error(errorMsg);
          }
          allInstitutions = res.data.institutions || [];
          updateStats();
          renderCards(currentFilter);
        } catch (err) {
          console.error("Load error:", err);
          const isNetworkError =
            err.message.includes("Failed to fetch") || err.name === "TypeError";
          const isJwtError =
            err.message.includes("Subject must be a string") ||
            err.message.includes("Invalid security token");

          if (isJwtError) {
            console.error("JWT Error detected:", err.message);
            showToast("⚠️ Security session issue. Please log in again.");
            // Don't auto-logout immediately, let the user see the error or try to retry once
            return;
          }

          const title = isNetworkError ? "Connection Failed" : "Server Error";
          document.getElementById("cardsContainer").innerHTML =
            `<div class="empty-state">
              <i class="bi bi-exclamation-octagon"></i>
              <strong>${title}</strong><br>
              <small style="color:#64748b">${err.message}</small><br>
              <button class="btn-approve mt-3" onclick="loadInstitutions()" style="font-size:0.75rem">Retry</button>
            </div>`;
        }
      }

      function updateStats() {
        const pending = allInstitutions.filter(
          (i) => i.status === "pending",
        ).length;
        const approved = allInstitutions.filter(
          (i) => i.status === "approved",
        ).length;
        const rejected = allInstitutions.filter(
          (i) => i.status === "rejected",
        ).length;
        document.getElementById("stat-total").textContent =
          allInstitutions.length;
        document.getElementById("stat-pending").textContent = pending;
        document.getElementById("stat-approved").textContent = approved;
        document.getElementById("stat-rejected").textContent = rejected;
      }

      function filterBy(filter, el) {
        currentFilter = filter;
        document
          .querySelectorAll(".filter-tab")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
        renderCards(filter);
      }

      function renderCards(filter) {
        const container = document.getElementById("cardsContainer");
        let list = allInstitutions;
        if (filter !== "all") list = list.filter((i) => i.status === filter);

        if (list.length === 0) {
          const msgs = {
            all: "No institutions registered yet.",
            pending: "No pending requests.",
            approved: "No approved institutions.",
            rejected: "No rejected institutions.",
          };
          container.innerHTML = `<div class="empty-state"><i class="bi bi-building"></i>${msgs[filter] || "None found."}</div>`;
          return;
        }

        container.innerHTML = list.map((inst) => buildCard(inst)).join("");
      }

      function buildCard(inst) {
        const date = new Date(inst.created_at).toLocaleDateString("en-IN", {
          day: "2-digit",
          month: "short",
          year: "numeric",
        });
        const codeSection = inst.institution_code
          ? `
      <div class="inst-code-box">
        <div><div class="label">Institution Code</div><div class="code">${inst.institution_code}</div></div>
        <button class="copy-btn" onclick="copyCode('${inst.institution_code}')"><i class="bi bi-clipboard me-1"></i>Copy</button>
      </div>
      <div style="font-size:0.72rem;color:#475569;margin-top:6px">
        Members: ${inst.admin_count || 0} admin · ${inst.staff_count || 0} staff / 2 max
      </div>
      ${
        inst.code_expires_at
          ? `
      <div style="font-size:0.7rem;color:#94a3b8;margin-top:4px;display:flex;align-items:center;gap:4px;">
        <i class="bi bi-clock-history"></i> Expires: ${new Date(inst.code_expires_at).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })}
      </div>`
          : ""
      } `
          : "";

        const actions =
          inst.status === "pending"
            ? `
      <div class="inst-actions">
        <button class="btn-approve" onclick="approveInstitution('${inst.id}')"><i class="bi bi-check-lg me-1"></i>Approve & Issue Code</button>
        <button class="btn-reject" onclick="openRejectModal('${inst.id}')"><i class="bi bi-x-lg me-1"></i>Reject</button>
      </div>`
            : inst.status === "rejected"
              ? `
      <div class="rejection-note">Rejection reason: ${inst.rejection_reason || "Not specified"}</div>`
              : "";

        return `
      <div class="inst-card ${inst.status}" id="card-${inst.id}">
        <div class="inst-header">
          <div>
            <div class="inst-name">${inst.name}</div>
            <div class="inst-meta">Requested on ${date}</div>
          </div>
          <div class="inst-badges">
            <span class="badge-status ${inst.status}">${inst.status.charAt(0).toUpperCase() + inst.status.slice(1)}</span>
          </div>
        </div>
        <div class="inst-details">
          <div class="inst-detail-item"><div class="key">Contact Person</div><div class="value">${inst.contact_person}</div></div>
          <div class="inst-detail-item"><div class="key">Email</div><div class="value">${inst.email}</div></div>
          <div class="inst-detail-item"><div class="key">Phone</div><div class="value">${inst.phone || "—"}</div></div>
          ${inst.approved_at ? `<div class="inst-detail-item"><div class="key">Approved At</div><div class="value">${new Date(inst.approved_at).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" })}</div></div>` : ""}
        </div>
        ${codeSection}
        ${actions}
      </div>`;
      }

      // ── Approve ───────────────────────────────────────────
      async function approveInstitution(id) {
        try {
          const res = await apiPost(
            `/api/superadmin/institutions/${id}/approve`,
            {},
            true,
          );
          if (res.ok) {
            showToast(
              `✅ Institution approved! Code: ${res.data.institution_code}`,
            );
            await loadInstitutions();
          } else {
            showToast("❌ " + (res.data.error || "Approval failed."));
          }
        } catch {
          showToast("❌ Cannot reach backend.");
        }
      }

      // ── Reject modal ──────────────────────────────────────
      function openRejectModal(id) {
        rejectTargetId = id;
        document.getElementById("rejectModal").classList.add("show");
      }
      function closeModal() {
        document.getElementById("rejectModal").classList.remove("show");
        rejectTargetId = null;
        document.getElementById("rejectReason").value = "";
      }

      async function confirmReject() {
        if (!rejectTargetId) return;
        const reason = document.getElementById("rejectReason").value.trim();
        try {
          const res = await apiPost(
            `/api/superadmin/institutions/${rejectTargetId}/reject`,
            { reason },
            true,
          );
          if (res.ok) {
            showToast("Institution rejected.");
            closeModal();
            await loadInstitutions();
          } else {
            showToast("❌ " + (res.data.error || "Failed."));
          }
        } catch {
          showToast("❌ Cannot reach backend.");
        }
      }

      // ── Copy code ─────────────────────────────────────────
      function copyCode(code) {
        navigator.clipboard
          .writeText(code)
          .then(() => showToast(`Copied: ${code}`));
      }

      // ── Toast ─────────────────────────────────────────────
      function showToast(msg) {
        const t = document.getElementById("toast");
        document.getElementById("toastMsg").textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3500);
      }

      loadInstitutions();
    </script>
  </body>
</html>
