services:
  - type: web
    plan: free
    name: kavachnet-backend
    env: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers=4 --threads=2 --timeout=60 --bind=0.0.0.0:$PORT app:app
    envVars:
      - key: NODE_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SUPERADMIN_USERNAME
        value: kavachnet_root
      - key: SUPERADMIN_PASSWORD
        generateValue: true
      - key: DB_NAME
        value: kavachnet.db
      - key: REDIS_URL
        sync: false
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
