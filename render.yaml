services:
  - type: web
    plan: free
    name: kavachnet-backend
    env: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers=4 --threads=2 --timeout=60 --bind=0.0.0.0:$PORT app:app
    envVars:
      - key: NODE_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SUPERADMIN_USERNAME
        value: kavachnet_root
      - key: SUPERADMIN_PASSWORD
        generateValue: true
      - key: DB_NAME
        value: kavachnet.db
      - key: REDIS_URL
        sync: false
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

      - key: EMAIL_DRY_RUN
        value: "True"
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: ALLOWED_ORIGINS
        value: "https://kavachnet-frontend.onrender.com,http://kavachnet-bucket.s3-website.amazonaws.com"


  - type: web
    name: kavachnet-frontend
    env: static
    rootDir: Frontend
    buildCommand: ""
    publishPath: .
